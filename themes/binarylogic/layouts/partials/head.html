<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xml:lang="en" lang="en-us">
  <head>
    <link href="http://gmpg.org/xfn/11" rel="profile">
    <meta http-equiv="content-type" content="text/html; charset=utf-8">

    <!-- Enable responsiveness on mobile devices-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">

    <title>
      {{ .Site.Title }} &middot;
      {{ if eq .Url "/" }}
        {{ .Site.Params.Tagline }}
      {{ else }}
        {{ .Title }}
      {{ end }}
    </title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/proxima_nova.css">
    <link rel="stylesheet" href="/css/poole.css">
    <link rel="stylesheet" href="/css/syntax.css">
    <link rel="stylesheet" href="/css/lanyon.css">
    <link rel="stylesheet" href="/css/binarylogic_theme.css">

    <!-- Icons -->
    <link rel="apple-touch-icon-precomposed" sizes="144x144" href="/assets/apple-touch-icon-144-precomposed.png">
    <link rel="shortcut icon" href="/assets/favicon.ico">

    <!-- RSS -->
    <link rel="alternate" type="application/rss+xml" title="RSS" href="/atom.xml">
  </head>


  <body class="{{ .Site.Params.Theme }}">

    {{ partial "sidebar.html" . }}


    <!-- Wrap is the content to shift when toggling the sidebar. We wrap the
         content to avoid any CSS collisions with our real content. -->
    <div class="wrap">
      <div class="container content">
        <div class="hero">
          <img src="http://www.gravatar.com/avatar/328f0bb678423fcea01ebe3b0edc74e6.png?s=100" class="me" />
          <h1>{{ .Site.Title }}</h1>
          <div class="tag-line">{{ .Site.Params.Tagline }}</div>
        </div>
