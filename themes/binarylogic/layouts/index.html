{{ partial "head.html" . }}

<div class="posts">
  {{ $paginator := .Paginate (where .Data.Pages "Type" "post") }}
  {{ range $paginator.Pages }}
    <div class="post">
      <h1 class="post-title"><a href="{{ .Permalink }}">{{ .Title }}</a></h1>
      <span class="post-date">
        {{ .Render "details" }}
      </span>
      {{ .Summary }}
      {{ if .Truncated }}
        <a href="{{ .Permalink }}">Read On &rarr;</a>
      {{ end }}
    </div>
  {{ end }}
</div>

{{ partial "pagination.html" . }}
{{ partial "foot.html" . }}
